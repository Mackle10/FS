    .site-title{font-weight:700}
    .motto{font-style:italic;color:#666;font-size:14px}
    nav.site-nav a{margin-left:12px;color:var(--brand-blue);text-decoration:none}
    main{padding:20px;max-width:1000px;margin:18px auto}
    footer.site-footer{border-top:1px solid #eee;padding:16px 18px;background:#fafafa;text-align:center;color:#333;display:flex;justify-content:space-between;gap:12px;align-items:center}
